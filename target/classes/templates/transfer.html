<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transfer Funds - Online Banking</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f9f4; margin: 0; padding: 0; }
        .navbar { background-color: #0056b3; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 1.2em; font-weight: bold; }
        .navbar-links a { color: white; text-decoration: none; padding: 10px; font-weight: bold; margin-left: 10px; }
        .navbar-links a:hover { background-color: #004494; border-radius: 5px; }
        .centered-form { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); border-top: 5px solid #17a2b8;}
        h2 { color: #17a2b8; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: bold;}
        .form-group select, .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px;}
        .btn { width: 100%; padding: 12px; background-color: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; font-weight: bold;}
        .btn:hover { background-color: #138496; }
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">TrustBank</div>
        <div class="navbar-links">
            <a th:href="@{/customer/dashboard}">Dashboard</a>
            <a th:href="@{/customer/transactions}">Transactions</a>
            <a th:href="@{/logout}" style="background-color: #dc3545; border-radius: 5px;">Logout</a>
        </div>
    </div>

    <div class="centered-form">
        <h2>Transfer Funds</h2>
        
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>

        <form th:action="@{/customer/transfer}" method="post">
            <div class="form-group">
                <label for="fromAccountId">From Account:</label>
                <select id="fromAccountId" name="fromAccountId" required>
                    <option th:each="account : ${accounts}" 
                            th:value="${account.accountId}" 
                            th:text="${account.accountType} + ' - ' + ${account.accountNumber} + ' (Bal: $' + ${#numbers.formatDecimal(account.balance, 1, 2)} + ')'">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label for="toAccountNumber">Destination Account Number:</label>
                <input type="text" id="toAccountNumber" name="toAccountNumber" placeholder="Enter target account number" required>
            </div>
            <div class="form-group">
                <label for="amount">Transfer Amount ($):</label>
                <input type="number" id="amount" name="amount" min="1" step="0.01" required>
            </div>
            <button type="submit" class="btn">Complete Transfer</button>
        </form>
    </div>
</body>
</html>
