<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enterprise Reporting - Online Banking</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f9f4; margin: 0; padding: 0; }
        .navbar { background-color: #0056b3; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 1.2em; font-weight: bold; }
        .navbar-links a { color: white; text-decoration: none; padding: 10px; font-weight: bold; margin-left: 10px; }
        .navbar-links a:hover { background-color: #004494; border-radius: 5px; }
        .container { width: 95%; margin: 30px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; border-bottom: 2px solid #2e8b57; padding-bottom: 10px;}
        
        .filters { margin-bottom: 20px; padding: 15px; background-color: #e2f3e5; border-radius: 5px; border: 1px solid #c3e6cb; display: flex; gap: 15px; align-items: center;}
        .filters input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-filter { padding: 8px 15px; background-color: #2e8b57; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-filter:hover { background-color: #246d44; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #343a40; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
    <!-- Built-in Search function strictly using Vanilla JS per HTML-only rule -->
    <script>
        function searchTable() {
            var inputName = document.getElementById("searchName").value.toUpperCase();
            var inputAcc = document.getElementById("searchAcc").value.toUpperCase();
            
            var table = document.getElementById("reportTable");
            var tr = table.getElementsByTagName("tr");

            for (var i = 1; i < tr.length; i++) {
                var tdName = tr[i].getElementsByTagName("td")[2];
                var tdAcc = tr[i].getElementsByTagName("td")[3];
                
                if (tdName && tdAcc) {
                    var txtName = tdName.textContent || tdName.innerText;
                    var txtAcc = tdAcc.textContent || tdAcc.innerText;
                    
                    if (txtName.toUpperCase().indexOf(inputName) > -1 && txtAcc.toUpperCase().indexOf(inputAcc) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }       
            }
        }
        
        function downloadCSV() {
            var rows = document.querySelectorAll("table tr");
            var csv = [];
            for (var i = 0; i < rows.length; i++) {
                var row = [], cols = rows[i].querySelectorAll("td, th");
                for (var j = 0; j < cols.length; j++) 
                    row.push('"' + cols[j].innerText + '"');
                csv.push(row.join(","));
            }
            var csvContent = "data:text/csv;charset=utf-8," + csv.join("\n");
            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "transaction_report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">TrustBank Admin</div>
        <div class="navbar-links">
            <a th:href="@{/admin/dashboard}">Manage Users</a>
            <a th:href="@{/admin/report}" style="text-decoration: underline;">All Transactions Report</a>
            <a th:href="@{/logout}" style="background-color: #dc3545; border-radius: 5px;">Logout</a>
        </div>
    </div>

    <div class="container">
        <h2>Global Transaction Report</h2>
        
        <div class="filters">
            <strong>Search Records:</strong>
            <input type="text" id="searchName" placeholder="Search by Customer Name" onkeyup="searchTable()">
            <input type="text" id="searchAcc" placeholder="Search by Account Number" onkeyup="searchTable()">
            <button class="btn-filter" onclick="downloadCSV()">⬇ Download CSV</button>
        </div>

        <table id="reportTable">
            <thead>
                <tr>
                    <th>Ref ID</th>
                    <th>Date & Time</th>
                    <th>Customer Name</th>
                    <th>Account No.</th>
                    <th>Txn Type</th>
                    <th>Amount ($)</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="txn : ${transactions}">
                    <td th:text="'TXN' + ${txn.transactionId}"></td>
                    <td th:text="${#temporals.format(txn.date, 'yyyy-MM-dd HH:mm')}"></td>
                    <td th:text="${txn.customerName}"></td>
                    <td th:text="${txn.accountNumber}"></td>
                    <td th:text="${txn.type}"></td>
                    <td th:text="${#numbers.formatDecimal(txn.amount, 1, 2)}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="6" style="text-align: center;">No transactions found in the system.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
