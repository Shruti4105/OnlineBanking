<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Online Banking</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f9f4; margin: 0; padding: 0; }
        .navbar { background-color: #0056b3; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 1.2em; font-weight: bold; }
        .navbar-links a { color: white; text-decoration: none; padding: 10px; font-weight: bold; margin-left: 10px; }
        .navbar-links a:hover { background-color: #004494; border-radius: 5px; }
        .container { width: 90%; margin: 30px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; border-bottom: 2px solid #2e8b57; padding-bottom: 10px;}
        .alert-error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .alert-success { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #0056b3; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-delete { padding: 8px 12px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 4px; font-size: 14px;}
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">TrustBank Admin</div>
        <div class="navbar-links">
            <a th:href="@{/admin/dashboard}">Manage Users</a>
            <a th:href="@{/admin/report}">All Transactions Report</a>
            <a th:href="@{/logout}" style="background-color: #dc3545; border-radius: 5px;">Logout</a>
        </div>
    </div>

    <div class="container">
        <h2>System Users Management</h2>

        <div th:if="${param.success}" class="alert-success">User successfully deleted.</div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <table>
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.userId}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.role}"></td>
                    <td>
                        <a th:href="@{/admin/deleteUser/{id}(id=${user.userId})}" class="btn-delete" onclick="return confirm('Are you sure you want to delete this user? All their associated accounts and transactions will also be permanently deleted.');">Delete User</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" style="text-align: center;">No registered customers found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
