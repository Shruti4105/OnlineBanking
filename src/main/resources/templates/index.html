<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome - Online Banking System</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f9f4; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .centered-form { max-width: 400px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #0056b3; }
        p { color: #555; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 25px; background-color: #2e8b57; color: white; text-decoration: none; border-radius: 4px; font-size: 16px; margin: 5px; }
        .btn:hover { background-color: #246d44; }
        .btn-outline { background-color: white; color: #2e8b57; border: 2px solid #2e8b57; }
        .btn-outline:hover { background-color: #e2f3e5; color: #246d44; }
    </style>
</head>
<body>
    <div class="centered-form">
        <h2>Secure Online Banking</h2>
        <p>Welcome to our fast, secure, and reliable banking system.</p>
        <a th:href="@{/login}" class="btn">Login Here</a>
        <a th:href="@{/register}" class="btn btn-outline">Register Now</a>
    </div>
</body>
</html>
